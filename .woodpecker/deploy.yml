when:
  - event: manual

steps:
  - name: check-vars
    image: alpine
    commands:
      - "[ -n \"$IMAGE_TAG\" ] || (echo 'IMAGE_TAG not set, skipping deploy'; exit 78)"

  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - "kubectl set image deployment/health health=${IMAGE_NAME}:${IMAGE_TAG} -n health"
      - "kubectl rollout status deployment/health -n health --timeout=300s"

  - name: notify
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack-webhook-url
      channel: general
    when:
      - status: [success, failure]
